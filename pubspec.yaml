name: ziarat_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  google_fonts:
  smooth_page_indicator:
  equatable: ^2.0.7
  dartz: ^0.10.1
  get_it: ^9.0.5
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  logger: ^2.6.1
  hijri: ^3.0.0
  adhan_dart: ^1.2.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  intl: ^0.20.2
  audioplayers: ^6.0.0
  get: ^4.7.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  firebase_core: ^4.4.0
  cloud_firestore: ^6.2.0

  device_preview:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # ✅ Added for app icon generation
  flutter_launcher_icons: ^0.14.3

# ✅ App icon config — points to your splash image
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/splashscreen.png"
  # Optional: adaptive icon for Android (API 26+)
  adaptive_icon_background: "#243243"   # ✅ matches your app backgroundColor
  adaptive_icon_foreground: "assets/images/splashscreen.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/json/

  fonts:
    - family: noto-sans
      fonts:
        - asset: assets/fonts/NotoSansArabic.ttf
          weight: 400
    - family: al-majeed-quranic
      fonts:
        - asset: assets/fonts/AlMajeedQuranic.ttf
          weight: 400
    - family: jameel-noori
      fonts:
        - asset: assets/fonts/JameelNoori.ttf
          weight: 400